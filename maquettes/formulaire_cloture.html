<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clôture - Étape 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gray-100 min-h-screen flex items-center justify-center p-4 font-sans"
  >
    <div
      class="bg-white max-w-xl w-full rounded-xl shadow-lg border border-gray-200 overflow-hidden"
    >
      <div class="bg-blue-900 text-white p-6 text-center">
        <h1 class="text-xl font-bold tracking-wide">CLÔTURE JOURNALIÈRE</h1>
        <p class="text-blue-200 text-sm mt-1">Étape 1 sur 2 : Activité</p>
      </div>

      <div class="p-8 space-y-6">
        <div class="grid grid-cols-1 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Praticien</label
            >
            <select
              class="w-full border-gray-300 rounded-lg p-2 border focus:ring-blue-500 bg-white"
            >
              <option>Dr. Blin</option>
              <option>Dr. Shaq</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Heure d'arrivée</label
            >
            <input
              type="time"
              value="09:00"
              class="w-full border-gray-300 rounded-lg p-2 border focus:ring-blue-500"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Heure de départ</label
            >
            <input
              type="time"
              value="18:15"
              class="w-full border-gray-300 rounded-lg p-2 border focus:ring-blue-500"
            />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Nombre de patients vus</label
            >
            <input
              type="number"
              placeholder="Ex: 14"
              class="w-full border-gray-300 rounded-lg p-2 border focus:ring-blue-500"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Dont nouveaux patients</label
            >
            <input
              type="number"
              placeholder="Ex: 3"
              class="w-full border-gray-300 rounded-lg p-2 border focus:ring-blue-500"
            />
          </div>
        </div>

        <div class="border-t pt-4">
          <h3
            class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3"
          >
            Absentéisme
          </h3>
          <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >RDV Manqués (Patients Connus)</label
              >
              <input
                type="number"
                value="1"
                class="w-full border-gray-300 rounded-lg p-2 border focus:ring-blue-500"
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >RDV Manqués (Nouveaux Patients)</label
              >
              <input
                type="number"
                value="2"
                class="w-full border-gray-300 rounded-lg p-2 border focus:ring-blue-500"
              />
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Temps total perdu (absences)</label
            >
            <input
              type="time"
              value="00:30"
              class="w-full border-gray-300 rounded-lg p-2 border focus:ring-blue-500"
            />
          </div>
        </div>

        <div class="pt-4 flex justify-end">
          <button
            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow transition-colors"
          >
            Étape suivante ➔
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
